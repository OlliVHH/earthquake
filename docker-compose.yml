services:
  db:
    image: mysql:9
    container_name: earthquake-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: earthquake-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  sync:
    build: ./backend
    container_name: earthquake-sync
    restart: unless-stopped
    env_file: .env
    environment:
      SKIP_MIGRATIONS: "1"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["python", "-m", "app.services.sync_worker"]

  frontend:
    build: ./frontend
    container_name: earthquake-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9080:80"

volumes:
  mysql_data:
